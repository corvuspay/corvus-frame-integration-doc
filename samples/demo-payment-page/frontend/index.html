<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Test</title>
    <link rel="stylesheet" href="shop.css" />
  </head>
  <body>
    <script src="http://127.0.0.1:40590/cjs.bundle.js"></script>
    <script src="shop.js"></script>

    <div id="corvuspay-payment-form">
      <div id="corvuspay-card-element"></div>
      <p id="corvuspay-error" role="alert"></p>
      <div class="item-button-wrapper">
        <input
          class="item-button"
          type="submit"
          value="Pay now"
          disabled="true"
        />
      </div>
    </div>

    <div id="card-information">
        <div>
            <h4>Card Information</h4>

            <div class="row">
                <div class="label">Card brand</div>
                <div id="cardBrand" class="value">—</div>
            </div>

            <div class="row">
                <div class="label">Discount supported</div>
                <span id="discountSupported" class="value">—</span>
            </div>
            
            <div class="row">
                <div class="label">Amount with discount</div>
                <div id="amountWithDiscount" class="value">—</div>
            </div>
            
            <div class="row">
                <div class="label">Number of Installments:</div>
                <select id="numberOfInstallments" disabled class="value">

                </select>
            </div>
            
        </div>
    </div>

  </body>
</html>
